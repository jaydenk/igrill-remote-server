<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>iGrill Remote</title>
  <link rel="stylesheet" href="https://unpkg.com/uplot@1.6.31/dist/uPlot.min.css">
  <script src="https://unpkg.com/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-card: #0f3460;
      --bg-card-hover: #134074;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0b8;
      --text-muted: #6c6c80;
      --accent: #e94560;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --amber: #f5a623;
      --border: #2a2a4a;
      --radius: 10px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* -- Header --------------------------------------------------------- */

    header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s ease;
    }

    .status-dot.connected {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    /* -- Tab Bar -------------------------------------------------------- */

    .tab-bar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      position: sticky;
      top: 56px;
      z-index: 15;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab-btn {
      flex: 1;
      padding: 0.75rem 1rem;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
      text-align: center;
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* -- Tab Content ---------------------------------------------------- */

    .tab-content {
      display: none;
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    /* -- Session Banner ------------------------------------------------- */

    .session-banner {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }

    .session-banner-idle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem 1rem;
    }

    .session-banner-idle p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .session-banner-active {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .session-info {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .session-stat {
      display: flex;
      flex-direction: column;
    }

    .session-stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .session-stat-value {
      font-size: 1rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* -- Buttons -------------------------------------------------------- */

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-danger {
      background: var(--red);
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .btn-ghost:hover {
      border-color: var(--text-secondary);
      color: var(--text-primary);
    }

    /* -- Device Cards --------------------------------------------------- */

    .device-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    .device-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      transition: background 0.2s ease;
    }

    .device-card:hover {
      background: var(--bg-card-hover);
    }

    .device-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .device-header-left {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .device-name {
      font-size: 1rem;
      font-weight: 600;
    }

    .device-model {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .device-header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .ble-state-badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .ble-state-badge.state-polling {
      background: rgba(74, 222, 128, 0.15);
      color: var(--green);
    }

    .ble-state-badge.state-connecting,
    .ble-state-badge.state-authenticating {
      background: rgba(251, 191, 36, 0.15);
      color: var(--yellow);
    }

    .ble-state-badge.state-disconnected,
    .ble-state-badge.state-backoff,
    .ble-state-badge.state-discovered {
      background: rgba(248, 113, 113, 0.15);
      color: var(--red);
    }

    .battery-badge {
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-weight: 500;
    }

    .battery-badge.good {
      background: rgba(74, 222, 128, 0.15);
      color: var(--green);
    }

    .battery-badge.medium {
      background: rgba(251, 191, 36, 0.15);
      color: var(--yellow);
    }

    .battery-badge.low {
      background: rgba(248, 113, 113, 0.15);
      color: var(--red);
    }

    .probes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 0.5rem;
    }

    .probe {
      background: var(--bg-secondary);
      border-radius: 6px;
      padding: 0.6rem;
    }

    .probe-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
      text-align: center;
    }

    .probe-temp {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      font-variant-numeric: tabular-nums;
      line-height: 1.3;
    }

    .probe-temp.unplugged {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .probe-temp.temp-normal {
      color: var(--text-primary);
    }

    .probe-temp.temp-approaching {
      color: var(--amber);
    }

    .probe-temp.temp-reached {
      color: var(--green);
    }

    .probe-temp.temp-exceeded {
      color: var(--red);
    }

    .probe-target {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 0.15rem;
    }

    .device-unit {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-align: right;
      margin-top: 0.4rem;
    }

    /* -- Empty State ---------------------------------------------------- */

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state p {
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    /* -- Charts --------------------------------------------------------- */

    .charts-section {
      display: none;
    }

    .charts-section.visible {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .chart-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      overflow: hidden;
    }

    .chart-container .chart-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .chart-container .chart-wrapper {
      width: 100%;
      min-height: 0;
    }

    .chart-container .chart-wrapper .uplot {
      width: 100% !important;
    }

    .per-probe-charts {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* -- Placeholder Tabs ----------------------------------------------- */

    .placeholder {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* -- Modal / Overlay ------------------------------------------------ */

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .modal h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .modal-section {
      margin-bottom: 1.25rem;
    }

    .modal-section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .device-check {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0;
    }

    .device-check input[type="checkbox"] {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
    }

    .device-check label {
      font-size: 0.9rem;
      color: var(--text-primary);
      cursor: pointer;
    }

    .device-check .device-check-addr {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: 0.25rem;
    }

    .target-config {
      background: var(--bg-card);
      border-radius: 6px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .target-config-header {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .target-config-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
    }

    .target-config-row label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      min-width: 4rem;
    }

    .target-config-row select,
    .target-config-row input[type="number"] {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      padding: 0.35rem 0.5rem;
      font-size: 0.85rem;
    }

    .target-config-row input[type="number"] {
      width: 5rem;
    }

    .target-config-row select {
      min-width: 5rem;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .no-devices-message {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-style: italic;
      padding: 0.5rem 0;
    }

    /* -- Responsive ----------------------------------------------------- */

    @media (max-width: 600px) {
      .tab-content {
        padding: 1rem;
      }

      .device-cards {
        grid-template-columns: 1fr;
      }

      .session-banner-active {
        flex-direction: column;
        align-items: stretch;
      }

      .session-info {
        justify-content: space-between;
      }

      .modal {
        margin: 0.5rem;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>iGrill Remote</h1>
  <div class="connection-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Disconnected</span>
  </div>
</header>

<nav class="tab-bar">
  <button class="tab-btn active" data-tab="live">Live</button>
  <button class="tab-btn" data-tab="history">History</button>
  <button class="tab-btn" data-tab="settings">Settings</button>
</nav>

<!-- ================================================================== -->
<!-- Live Tab                                                            -->
<!-- ================================================================== -->
<div class="tab-content active" id="tab-live">

  <!-- Session Banner -->
  <section>
    <div class="section-title">Session</div>
    <div class="session-banner" id="sessionBanner">
      <div class="session-banner-idle" id="sessionIdle">
        <p>No active session</p>
        <button class="btn btn-primary" id="btnStartSession">Start Session</button>
      </div>
      <div class="session-banner-active" id="sessionActive" style="display:none;">
        <div class="session-info">
          <div class="session-stat">
            <span class="session-stat-label">Duration</span>
            <span class="session-stat-value" id="sessionDuration">&mdash;</span>
          </div>
          <div class="session-stat">
            <span class="session-stat-label">Devices</span>
            <span class="session-stat-value" id="sessionDeviceCount">0</span>
          </div>
        </div>
        <button class="btn btn-danger" id="btnEndSession">End Session</button>
      </div>
    </div>
  </section>

  <!-- Devices -->
  <section>
    <div class="section-title">Devices</div>
    <div class="device-cards" id="deviceCards">
      <div class="empty-state" id="emptyState">
        <p>No devices discovered yet.</p>
        <p>Waiting for data&hellip;</p>
      </div>
    </div>
  </section>

  <!-- Charts (visible when session active) -->
  <section class="charts-section" id="chartsSection">
    <div class="section-title">Temperature Charts</div>
    <div class="chart-container" id="combinedChartContainer">
      <div class="chart-title">All Probes</div>
      <div class="chart-wrapper" id="combinedChartWrapper"></div>
    </div>
    <div class="per-probe-charts" id="perProbeCharts"></div>
  </section>
</div>

<!-- ================================================================== -->
<!-- History Tab                                                         -->
<!-- ================================================================== -->
<div class="tab-content" id="tab-history">
  <div class="placeholder">History &mdash; coming soon</div>
</div>

<!-- ================================================================== -->
<!-- Settings Tab                                                        -->
<!-- ================================================================== -->
<div class="tab-content" id="tab-settings">
  <div class="placeholder">Settings &mdash; coming soon</div>
</div>

<!-- ================================================================== -->
<!-- Start Session Modal                                                 -->
<!-- ================================================================== -->
<div class="modal-overlay" id="sessionModal">
  <div class="modal">
    <h2>Start Session</h2>

    <div class="modal-section">
      <div class="modal-section-title">Devices</div>
      <div id="modalDeviceList">
        <p class="no-devices-message">No devices available.</p>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Targets (optional)</div>
      <div id="modalTargetList"></div>
      <button class="btn btn-ghost" id="btnAddTarget" style="margin-top:0.5rem; font-size:0.8rem;">+ Add Target</button>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnCancelSession">Cancel</button>
      <button class="btn btn-primary" id="btnConfirmStart">Start</button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ------------------------------------------------------------------ */
  /* State                                                               */
  /* ------------------------------------------------------------------ */

  var devices = {};           /* keyed by sensorId (MAC address) */
  var deviceBleStates = {};   /* keyed by address -> connection state string */
  var probeAlertStates = {};  /* keyed by "sensorId:probeIndex" -> "approaching"|"reached"|"exceeded" */
  var session = {
    id: null,
    startTs: null,
    devices: [],
    targets: []
  };
  var durationTimer = null;

  /* Chart state */
  var PROBE_COLOURS = ["#4fc3f7", "#81c784", "#ffb74d", "#ba68c8"];
  var CHART_WINDOW_SECONDS = 30 * 60; /* 30 minutes */
  var chartData = [];       /* array of { ts: epoch_seconds, probes: { 1: temp, 2: temp, ... } } */
  var activeProbeIndices = new Set();
  var combinedChart = null;
  var perProbeCharts = {};   /* keyed by probe index */
  var uplotAvailable = typeof window.uPlot === "function";

  /* DOM refs */
  var statusDot       = document.getElementById("statusDot");
  var statusText      = document.getElementById("statusText");
  var sessionIdle     = document.getElementById("sessionIdle");
  var sessionActive   = document.getElementById("sessionActive");
  var sessionDurEl    = document.getElementById("sessionDuration");
  var sessionDevCount = document.getElementById("sessionDeviceCount");
  var deviceCards     = document.getElementById("deviceCards");
  var emptyState      = document.getElementById("emptyState");
  var chartsSection   = document.getElementById("chartsSection");
  var combinedChartWrapper = document.getElementById("combinedChartWrapper");
  var perProbeChartsEl = document.getElementById("perProbeCharts");

  /* Modal refs */
  var sessionModal    = document.getElementById("sessionModal");
  var modalDeviceList = document.getElementById("modalDeviceList");
  var modalTargetList = document.getElementById("modalTargetList");

  /* ------------------------------------------------------------------ */
  /* Tab switching                                                       */
  /* ------------------------------------------------------------------ */

  var tabButtons = document.querySelectorAll(".tab-btn");
  var tabPanels  = document.querySelectorAll(".tab-content");

  tabButtons.forEach(function (btn) {
    btn.addEventListener("click", function () {
      var target = btn.getAttribute("data-tab");
      tabButtons.forEach(function (b) { b.classList.remove("active"); });
      tabPanels.forEach(function (p) { p.classList.remove("active"); });
      btn.classList.add("active");
      var panel = document.getElementById("tab-" + target);
      if (panel) panel.classList.add("active");
    });
  });

  /* ------------------------------------------------------------------ */
  /* Helpers                                                             */
  /* ------------------------------------------------------------------ */

  function generateRequestId() {
    return "req-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);
  }

  function formatDuration(startIso) {
    if (!startIso) return "\u2014";
    var start = new Date(startIso);
    if (isNaN(start.getTime())) return "\u2014";
    var diff = Math.max(0, Math.floor((Date.now() - start.getTime()) / 1000));
    var h = Math.floor(diff / 3600);
    var m = Math.floor((diff % 3600) / 60);
    var s = diff % 60;
    var parts = [];
    if (h > 0) parts.push(h + "h");
    parts.push(m + "m");
    parts.push(s + "s");
    return parts.join(" ");
  }

  function batteryClass(pct) {
    if (pct == null) return "medium";
    if (pct > 60) return "good";
    if (pct >= 30) return "medium";
    return "low";
  }

  function bleStateLabel(state) {
    switch (state) {
      case "polling":        return "Polling";
      case "connecting":     return "Connecting";
      case "authenticating": return "Authenticating";
      case "disconnected":   return "Disconnected";
      case "backoff":        return "Backoff";
      case "discovered":     return "Discovered";
      default:               return state || "Unknown";
    }
  }

  function bleStateCssClass(state) {
    switch (state) {
      case "polling":        return "state-polling";
      case "connecting":     return "state-connecting";
      case "authenticating": return "state-authenticating";
      case "disconnected":   return "state-disconnected";
      case "backoff":        return "state-backoff";
      case "discovered":     return "state-discovered";
      default:               return "state-disconnected";
    }
  }

  /** Create an element with optional className and textContent. */
  function el(tag, className, text) {
    var node = document.createElement(tag);
    if (className) node.className = className;
    if (text != null) node.textContent = String(text);
    return node;
  }

  /* ------------------------------------------------------------------ */
  /* Rendering — Session Banner                                          */
  /* ------------------------------------------------------------------ */

  function renderSessionBanner() {
    if (session.id != null) {
      sessionIdle.style.display = "none";
      sessionActive.style.display = "";
      updateDuration();
      startDurationTimer();

      var devCount = session.devices ? session.devices.length : Object.keys(devices).length;
      sessionDevCount.textContent = devCount;
    } else {
      sessionIdle.style.display = "";
      sessionActive.style.display = "none";
      stopDurationTimer();
    }
  }

  /* ------------------------------------------------------------------ */
  /* Rendering — Device Cards                                            */
  /* ------------------------------------------------------------------ */

  function renderDevices() {
    var keys = Object.keys(devices);
    if (keys.length === 0) {
      emptyState.style.display = "";
      return;
    }
    emptyState.style.display = "none";

    /* Remove stale cards */
    var existingCards = deviceCards.querySelectorAll(".device-card");
    existingCards.forEach(function (card) {
      if (!devices[card.dataset.sensorId]) {
        card.remove();
      }
    });

    keys.forEach(function (sensorId) {
      var dev = devices[sensorId];
      var card = deviceCards.querySelector("[data-sensor-id=\"" + sensorId + "\"]");
      if (!card) {
        card = document.createElement("div");
        card.className = "device-card";
        card.dataset.sensorId = sensorId;
        deviceCards.appendChild(card);
      }
      while (card.firstChild) {
        card.removeChild(card.firstChild);
      }
      buildDeviceCard(card, dev, sensorId);
    });
  }

  function buildDeviceCard(card, dev, sensorId) {
    var data = dev.data || {};
    var name = data.name || sensorId;
    var model = data.model_name || data.model || "";
    var battPct = data.battery_percent;
    var battLabel = battPct != null ? battPct + "%" : "\u2014";
    var battCls = batteryClass(battPct);
    var unit = data.unit || "";
    var probes = data.probes || [];
    var bleState = deviceBleStates[sensorId] || "polling";

    /* Header row */
    var header = el("div", "device-header");

    var headerLeft = el("div", "device-header-left");
    headerLeft.appendChild(el("div", "device-name", name));
    if (model) headerLeft.appendChild(el("div", "device-model", model));
    header.appendChild(headerLeft);

    var headerRight = el("div", "device-header-right");
    headerRight.appendChild(el("span", "ble-state-badge " + bleStateCssClass(bleState), bleStateLabel(bleState)));
    headerRight.appendChild(el("span", "battery-badge " + battCls, battLabel));
    header.appendChild(headerRight);

    card.appendChild(header);

    /* Probes grid */
    if (probes.length > 0) {
      var grid = el("div", "probes-grid");
      probes.forEach(function (p) {
        var probeEl = el("div", "probe");
        probeEl.appendChild(el("div", "probe-label", "Probe " + p.index));

        if (p.unplugged) {
          probeEl.appendChild(el("div", "probe-temp unplugged", "Unplugged"));
        } else if (p.temperature != null) {
          var tempText = Number(p.temperature).toFixed(1) + "\u00B0";
          var alertKey = sensorId + ":" + p.index;
          var alertState = probeAlertStates[alertKey];
          var tempClass = "probe-temp temp-normal";
          if (alertState === "exceeded") {
            tempClass = "probe-temp temp-exceeded";
          } else if (alertState === "reached") {
            tempClass = "probe-temp temp-reached";
          } else if (alertState === "approaching") {
            tempClass = "probe-temp temp-approaching";
          }
          probeEl.appendChild(el("div", tempClass, tempText));

          /* Show target inline if available */
          var target = findTargetForProbe(p.index);
          if (target) {
            var targetText = "";
            if (target.mode === "range" && target.range_low != null && target.range_high != null) {
              targetText = "\u2192 " + target.range_low + "\u2013" + target.range_high + "\u00B0";
            } else if (target.target_value != null) {
              targetText = "\u2192 " + target.target_value + "\u00B0";
            }
            if (targetText) {
              probeEl.appendChild(el("div", "probe-target", targetText));
            }
          }
        } else {
          probeEl.appendChild(el("div", "probe-temp unplugged", "\u2014"));
        }
        grid.appendChild(probeEl);
      });
      card.appendChild(grid);
      if (unit) {
        card.appendChild(el("div", "device-unit", "Unit: \u00B0" + unit));
      }
    } else {
      var empty = el("div", "empty-state");
      empty.style.padding = "1rem 0";
      empty.appendChild(el("p", null, "No probe data"));
      card.appendChild(empty);
    }
  }

  function findTargetForProbe(probeIndex) {
    if (!session.targets || session.targets.length === 0) return null;
    for (var i = 0; i < session.targets.length; i++) {
      if (session.targets[i].probe_index === probeIndex) {
        return session.targets[i];
      }
    }
    return null;
  }

  /* ------------------------------------------------------------------ */
  /* Charts                                                              */
  /* ------------------------------------------------------------------ */

  /**
   * Reusable chart creation function.
   * @param {HTMLElement} container
   * @param {Object} options - { probes: [{index, label, color}], width, height, targets: [{probeIndex, mode, value, low, high}] }
   * @returns {{ addReading, setTargets, destroy, resize }}
   */
  function createTemperatureChart(container, options) {
    if (!uplotAvailable) {
      return { addReading: function(){}, setTargets: function(){}, destroy: function(){}, resize: function(){} };
    }

    var probes = options.probes || [];
    var targets = options.targets || [];
    var chartWidth = options.width || container.clientWidth || 400;
    var chartHeight = options.height || 250;

    /* Data arrays: index 0 = timestamps, 1..N = probe series */
    var timestamps = [];
    var seriesData = [];
    for (var i = 0; i < probes.length; i++) {
      seriesData.push([]);
    }

    /* Build CSS variable values */
    var computedStyle = getComputedStyle(document.documentElement);
    var bgCard = computedStyle.getPropertyValue("--bg-card").trim() || "#0f3460";
    var textSecondary = computedStyle.getPropertyValue("--text-secondary").trim() || "#a0a0b8";
    var borderColor = computedStyle.getPropertyValue("--border").trim() || "#2a2a4a";

    /* Build uPlot series config */
    var seriesConfig = [{ label: "Time" }];
    for (var j = 0; j < probes.length; j++) {
      seriesConfig.push({
        label: probes[j].label,
        stroke: probes[j].color,
        width: 2,
        paths: uPlot.paths.linear(),
        points: { show: false }
      });
    }

    /* Target line drawing plugin */
    var targetLines = targets.slice();

    function drawTargetLines(u) {
      var ctx = u.ctx;
      ctx.save();
      var yScale = u.scales.y;
      var plotLeft = u.bbox.left / devicePixelRatio;
      var plotTop = u.bbox.top / devicePixelRatio;
      var plotWidth = u.bbox.width / devicePixelRatio;
      var plotHeight = u.bbox.height / devicePixelRatio;

      for (var t = 0; t < targetLines.length; t++) {
        var tgt = targetLines[t];
        /* Find colour for this probe index */
        var tgtColor = "#888";
        for (var p = 0; p < probes.length; p++) {
          if (probes[p].index === tgt.probeIndex) {
            tgtColor = probes[p].color;
            break;
          }
        }

        ctx.strokeStyle = tgtColor;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 4]);
        ctx.globalAlpha = 0.7;

        var drawLine = function(val) {
          if (val == null) return;
          var yPos = u.valToPos(val, "y", true);
          /* Only draw if within plot area */
          if (yPos >= plotTop && yPos <= plotTop + plotHeight) {
            ctx.beginPath();
            ctx.moveTo(plotLeft, yPos);
            ctx.lineTo(plotLeft + plotWidth, yPos);
            ctx.stroke();
          }
        };

        if (tgt.mode === "range") {
          drawLine(tgt.low);
          drawLine(tgt.high);
        } else {
          drawLine(tgt.value);
        }
      }
      ctx.restore();
    }

    var targetPlugin = {
      hooks: {
        draw: [drawTargetLines]
      }
    };

    /* Build uPlot options */
    var opts = {
      width: chartWidth,
      height: chartHeight,
      plugins: [targetPlugin],
      cursor: {
        drag: { x: false, y: false }
      },
      scales: {
        x: { time: true },
        y: { auto: true }
      },
      axes: [
        {
          stroke: textSecondary,
          grid: { stroke: borderColor, width: 1 },
          ticks: { stroke: borderColor, width: 1 },
          font: "11px -apple-system, BlinkMacSystemFont, sans-serif",
          labelFont: "11px -apple-system, BlinkMacSystemFont, sans-serif"
        },
        {
          stroke: textSecondary,
          grid: { stroke: borderColor, width: 1 },
          ticks: { stroke: borderColor, width: 1 },
          font: "11px -apple-system, BlinkMacSystemFont, sans-serif",
          labelFont: "11px -apple-system, BlinkMacSystemFont, sans-serif",
          label: "\u00B0C",
          size: 50
        }
      ],
      series: seriesConfig
    };

    var plotData = [timestamps].concat(seriesData);
    var plot = new uPlot(opts, plotData, container);

    return {
      addReading: function(timestamp, probeTemps) {
        /* timestamp: epoch seconds (number), probeTemps: { probeIndex: temp } */
        timestamps.push(timestamp);
        for (var s = 0; s < probes.length; s++) {
          var temp = probeTemps[probes[s].index];
          seriesData[s].push(temp != null ? temp : null);
        }

        /* Auto-scroll: trim data older than CHART_WINDOW_SECONDS from the latest */
        var latest = timestamps[timestamps.length - 1];
        var cutoff = latest - CHART_WINDOW_SECONDS;
        while (timestamps.length > 1 && timestamps[0] < cutoff) {
          timestamps.shift();
          for (var r = 0; r < seriesData.length; r++) {
            seriesData[r].shift();
          }
        }

        var newData = [timestamps].concat(seriesData);
        plot.setData(newData);
      },
      setTargets: function(newTargets) {
        targetLines = newTargets.slice();
        plot.redraw();
      },
      destroy: function() {
        plot.destroy();
      },
      resize: function(w, h) {
        plot.setSize({ width: w, height: h || chartHeight });
      }
    };
  }

  /** Build target objects array from session.targets for chart use. */
  function buildChartTargets() {
    if (!session.targets || session.targets.length === 0) return [];
    var result = [];
    for (var i = 0; i < session.targets.length; i++) {
      var t = session.targets[i];
      result.push({
        probeIndex: t.probe_index,
        mode: t.mode || "fixed",
        value: t.target_value != null ? t.target_value : null,
        low: t.range_low != null ? t.range_low : null,
        high: t.range_high != null ? t.range_high : null
      });
    }
    return result;
  }

  /** Determine active probe configs from activeProbeIndices. */
  function buildProbeConfigs() {
    var sorted = Array.from(activeProbeIndices).sort(function(a,b){ return a - b; });
    var configs = [];
    for (var i = 0; i < sorted.length; i++) {
      var idx = sorted[i];
      configs.push({
        index: idx,
        label: "Probe " + idx,
        color: PROBE_COLOURS[(idx - 1) % PROBE_COLOURS.length]
      });
    }
    return configs;
  }

  /** Destroy all current charts. */
  function destroyAllCharts() {
    if (combinedChart) {
      combinedChart.destroy();
      combinedChart = null;
    }
    var keys = Object.keys(perProbeCharts);
    for (var i = 0; i < keys.length; i++) {
      perProbeCharts[keys[i]].destroy();
    }
    perProbeCharts = {};
    /* Clear DOM containers */
    combinedChartWrapper.textContent = "";
    perProbeChartsEl.textContent = "";
  }

  /** Rebuild all charts from chartData. */
  function rebuildCharts() {
    if (!uplotAvailable) return;

    destroyAllCharts();

    var probeConfigs = buildProbeConfigs();
    if (probeConfigs.length === 0) return;

    var targets = buildChartTargets();
    var containerWidth = combinedChartWrapper.clientWidth || 400;

    /* Combined chart */
    combinedChart = createTemperatureChart(combinedChartWrapper, {
      probes: probeConfigs,
      width: containerWidth,
      height: 280,
      targets: targets
    });

    /* Per-probe charts */
    for (var p = 0; p < probeConfigs.length; p++) {
      var pc = probeConfigs[p];
      var wrapper = document.createElement("div");
      wrapper.className = "chart-container";
      wrapper.dataset.probeIndex = pc.index;

      var title = el("div", "chart-title", pc.label);
      wrapper.appendChild(title);

      var chartW = document.createElement("div");
      chartW.className = "chart-wrapper";
      wrapper.appendChild(chartW);

      perProbeChartsEl.appendChild(wrapper);

      /* Filter targets for this probe */
      var probeTargets = [];
      for (var t = 0; t < targets.length; t++) {
        if (targets[t].probeIndex === pc.index) {
          probeTargets.push(targets[t]);
        }
      }

      perProbeCharts[pc.index] = createTemperatureChart(chartW, {
        probes: [pc],
        width: chartW.clientWidth || containerWidth,
        height: 220,
        targets: probeTargets
      });
    }

    /* Replay existing data into charts */
    for (var d = 0; d < chartData.length; d++) {
      var reading = chartData[d];
      combinedChart.addReading(reading.ts, reading.probes);
      var pKeys = Object.keys(perProbeCharts);
      for (var k = 0; k < pKeys.length; k++) {
        var pIdx = parseInt(pKeys[k], 10);
        var singleProbe = {};
        singleProbe[pIdx] = reading.probes[pIdx] != null ? reading.probes[pIdx] : null;
        perProbeCharts[pIdx].addReading(reading.ts, singleProbe);
      }
    }
  }

  /** Append a reading to chart data and push into live charts. */
  function appendChartReading(timestampSeconds, probeTemps) {
    chartData.push({ ts: timestampSeconds, probes: probeTemps });

    /* Track which probes are active */
    var needsRebuild = false;
    var probeKeys = Object.keys(probeTemps);
    for (var i = 0; i < probeKeys.length; i++) {
      var idx = parseInt(probeKeys[i], 10);
      if (!activeProbeIndices.has(idx)) {
        activeProbeIndices.add(idx);
        needsRebuild = true;
      }
    }

    if (needsRebuild) {
      rebuildCharts();
      return; /* rebuild replays all data */
    }

    if (combinedChart) {
      combinedChart.addReading(timestampSeconds, probeTemps);
    }
    var pKeys = Object.keys(perProbeCharts);
    for (var k = 0; k < pKeys.length; k++) {
      var pIdx = parseInt(pKeys[k], 10);
      var single = {};
      single[pIdx] = probeTemps[pIdx] != null ? probeTemps[pIdx] : null;
      perProbeCharts[pIdx].addReading(timestampSeconds, single);
    }
  }

  /** Clear chart data and destroy charts. */
  function clearChartData() {
    chartData = [];
    activeProbeIndices = new Set();
    destroyAllCharts();
  }

  /** Show or hide the charts section. */
  function setChartsVisible(visible) {
    if (visible) {
      chartsSection.classList.add("visible");
    } else {
      chartsSection.classList.remove("visible");
    }
  }

  /** Extract probe temperatures from a reading payload's data.probes array. */
  function extractProbeTemps(dataProbes) {
    var temps = {};
    if (!dataProbes || !dataProbes.length) return temps;
    for (var i = 0; i < dataProbes.length; i++) {
      var p = dataProbes[i];
      if (!p.unplugged && p.temperature != null) {
        temps[p.index] = p.temperature;
      }
    }
    return temps;
  }

  /** Fetch existing session readings and populate charts. */
  function fetchSessionReadings(sessionId) {
    if (!sessionId) return;
    fetch("/api/sessions/" + encodeURIComponent(sessionId))
      .then(function(resp) {
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        return resp.json();
      })
      .then(function(data) {
        var readings = data.readings || [];
        if (readings.length === 0) return;

        /* Group readings by (recorded_at, address) to combine probes */
        var grouped = {};
        for (var i = 0; i < readings.length; i++) {
          var r = readings[i];
          var key = r.recorded_at + "|" + r.address;
          if (!grouped[key]) {
            grouped[key] = { ts: r.recorded_at, probes: {} };
          }
          if (r.temperature != null) {
            grouped[key].probes[r.probe_index] = r.temperature;
          }
        }

        /* Sort by timestamp and append */
        var entries = Object.values(grouped);
        entries.sort(function(a, b) {
          return a.ts < b.ts ? -1 : a.ts > b.ts ? 1 : 0;
        });

        for (var j = 0; j < entries.length; j++) {
          var entry = entries[j];
          var epochSec = new Date(entry.ts).getTime() / 1000;
          if (isNaN(epochSec)) continue;
          /* Track probes */
          var pKeys = Object.keys(entry.probes);
          for (var k = 0; k < pKeys.length; k++) {
            activeProbeIndices.add(parseInt(pKeys[k], 10));
          }
          chartData.push({ ts: epochSec, probes: entry.probes });
        }

        /* Now build and populate charts */
        setChartsVisible(true);
        rebuildCharts();
      })
      .catch(function(err) {
        console.warn("[iGrill] Failed to fetch session readings:", err);
      });
  }

  /** Handle window resize for chart responsiveness. */
  var resizeTimer = null;
  window.addEventListener("resize", function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      if (!uplotAvailable) return;
      var w = combinedChartWrapper.clientWidth;
      if (w <= 0) return;
      if (combinedChart) {
        combinedChart.resize(w, 280);
      }
      var pKeys = Object.keys(perProbeCharts);
      for (var k = 0; k < pKeys.length; k++) {
        var chartEl = perProbeChartsEl.querySelector("[data-probe-index='" + pKeys[k] + "'] .chart-wrapper");
        var cw = chartEl ? chartEl.clientWidth : w;
        perProbeCharts[pKeys[k]].resize(cw, 220);
      }
    }, 200);
  });

  /* Duration Timer                                                      */

  function updateDuration() {
    sessionDurEl.textContent = formatDuration(session.startTs);
  }

  function startDurationTimer() {
    stopDurationTimer();
    durationTimer = setInterval(updateDuration, 1000);
  }

  function stopDurationTimer() {
    if (durationTimer) {
      clearInterval(durationTimer);
      durationTimer = null;
    }
  }

  /* ------------------------------------------------------------------ */
  /* Session Modal                                                       */
  /* ------------------------------------------------------------------ */

  var targetCounter = 0;

  document.getElementById("btnStartSession").addEventListener("click", openSessionModal);
  document.getElementById("btnCancelSession").addEventListener("click", closeSessionModal);
  document.getElementById("btnConfirmStart").addEventListener("click", confirmStartSession);
  document.getElementById("btnAddTarget").addEventListener("click", addTargetRow);
  document.getElementById("btnEndSession").addEventListener("click", endSession);

  /* Close modal on overlay click */
  sessionModal.addEventListener("click", function (e) {
    if (e.target === sessionModal) closeSessionModal();
  });

  function openSessionModal() {
    populateModalDevices();
    modalTargetList.textContent = "";
    targetCounter = 0;
    sessionModal.classList.add("open");
  }

  function closeSessionModal() {
    sessionModal.classList.remove("open");
  }

  function populateModalDevices() {
    modalDeviceList.textContent = "";
    var keys = Object.keys(devices);
    if (keys.length === 0) {
      modalDeviceList.appendChild(el("p", "no-devices-message", "No devices available."));
      return;
    }
    keys.forEach(function (sensorId) {
      var dev = devices[sensorId];
      var data = dev.data || {};

      var row = el("div", "device-check");
      var checkbox = document.createElement("input");

      checkbox.id = "dev-" + sensorId;
      checkbox.value = sensorId;
      checkbox.checked = true;
      row.appendChild(checkbox);

      var lbl = document.createElement("label");
      lbl.htmlFor = "dev-" + sensorId;
      lbl.textContent = name;
      var addrSpan = el("span", "device-check-addr", "(" + sensorId + ")");
      lbl.appendChild(addrSpan);
      row.appendChild(lbl);

      modalDeviceList.appendChild(row);
    });
  }

  function addTargetRow() {
    targetCounter++;
    var container = el("div", "target-config");
    container.dataset.targetId = targetCounter;

    var headerRow = el("div", "target-config-header");
    headerRow.style.display = "flex";
    headerRow.style.justifyContent = "space-between";
    headerRow.style.alignItems = "center";

    var title = el("span", null, "Target " + targetCounter);
    headerRow.appendChild(title);

    var removeBtn = el("button", "btn btn-ghost", "\u00D7");
    removeBtn.style.padding = "0.15rem 0.5rem";
    removeBtn.style.fontSize = "1rem";
    removeBtn.style.lineHeight = "1";
    removeBtn.addEventListener("click", function () { container.remove(); });
    headerRow.appendChild(removeBtn);
    container.appendChild(headerRow);

    /* Probe index */
    var probeRow = el("div", "target-config-row");
    probeRow.appendChild(el("label", null, "Probe"));
    var probeSelect = document.createElement("select");
    probeSelect.className = "target-probe-index";
    for (var i = 1; i <= 4; i++) {
      var opt = document.createElement("option");
      opt.value = i;
      opt.textContent = "Probe " + i;
      probeSelect.appendChild(opt);
    }
    probeRow.appendChild(probeSelect);
    container.appendChild(probeRow);

    /* Mode */
    var modeRow = el("div", "target-config-row");
    modeRow.appendChild(el("label", null, "Mode"));
    var modeSelect = document.createElement("select");
    modeSelect.className = "target-mode";
    var optFixed = document.createElement("option");
    optFixed.value = "fixed";
    optFixed.textContent = "Fixed";
    modeSelect.appendChild(optFixed);
    var optRange = document.createElement("option");
    optRange.value = "range";
    optRange.textContent = "Range";
    modeSelect.appendChild(optRange);
    modeRow.appendChild(modeSelect);
    container.appendChild(modeRow);

    /* Value inputs */
    var valRow = el("div", "target-config-row target-value-row");
    valRow.appendChild(el("label", null, "Target"));
    var valInput = document.createElement("input");
    valInput.type = "number";
    valInput.className = "target-value";
    valInput.placeholder = "\u00B0C";
    valInput.step = "0.5";
    valRow.appendChild(valInput);
    container.appendChild(valRow);

    var rangeRow = el("div", "target-config-row target-range-row");
    rangeRow.style.display = "none";
    rangeRow.appendChild(el("label", null, "Low"));
    var lowInput = document.createElement("input");
    lowInput.type = "number";
    lowInput.className = "target-range-low";
    lowInput.placeholder = "\u00B0C";
    lowInput.step = "0.5";
    rangeRow.appendChild(lowInput);
    rangeRow.appendChild(el("label", null, "High"));
    var highInput = document.createElement("input");
    highInput.type = "number";
    highInput.className = "target-range-high";
    highInput.placeholder = "\u00B0C";
    highInput.step = "0.5";
    rangeRow.appendChild(highInput);
    container.appendChild(rangeRow);

    /* Toggle value/range visibility */
    modeSelect.addEventListener("change", function () {
      if (modeSelect.value === "range") {
        valRow.style.display = "none";
        rangeRow.style.display = "";
      } else {
        valRow.style.display = "";
        rangeRow.style.display = "none";
      }
    });

    modalTargetList.appendChild(container);
  }

  function confirmStartSession() {
    /* Collect selected devices */
    var checkboxes = modalDeviceList.querySelectorAll("input[type='checkbox']:checked");
    var selectedDevices = [];
    checkboxes.forEach(function (cb) { selectedDevices.push(cb.value); });

    if (selectedDevices.length === 0 && Object.keys(devices).length > 0) {
      /* No devices selected — do nothing */
      return;
    }

    /* Collect targets */
    var targetEls = modalTargetList.querySelectorAll(".target-config");
    var targets = [];
    targetEls.forEach(function (tEl) {
      var mode = tEl.querySelector(".target-mode").value;
      var probeIndex = parseInt(tEl.querySelector(".target-probe-index").value, 10);
      var target = { probe_index: probeIndex, mode: mode };
      if (mode === "fixed") {
        var val = parseFloat(tEl.querySelector(".target-value").value);
        if (!isNaN(val)) target.target_value = val;
      } else {
        var low = parseFloat(tEl.querySelector(".target-range-low").value);
        var high = parseFloat(tEl.querySelector(".target-range-high").value);
        if (!isNaN(low)) target.range_low = low;
        if (!isNaN(high)) target.range_high = high;
      }
      targets.push(target);
    });

    /* Send session_start_request via WebSocket */
    if (ws && ws.readyState === WebSocket.OPEN) {
      var payload = {};
      if (selectedDevices.length > 0) {
        payload.deviceAddresses = selectedDevices;
      }
      if (targets.length > 0) {
        payload.targets = targets;
      }
      ws.send(JSON.stringify({
        v: 2,
        type: "session_start_request",
        requestId: generateRequestId(),
        payload: payload
      }));
    }

    closeSessionModal();
  }

  function endSession() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        v: 2,
        type: "session_end_request",
        requestId: generateRequestId(),
        payload: {}
      }));
    }
  }

  /* ------------------------------------------------------------------ */
  /* WebSocket                                                           */
  /* ------------------------------------------------------------------ */

  var ws = null;
  var reconnectDelay = 1000;
  var maxReconnectDelay = 30000;
  var reconnectAttempt = 0;

  function connect() {
    var protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
    var url = protocol + "//" + window.location.host + "/ws";
    ws = new WebSocket(url);

    ws.onopen = function () {
      reconnectAttempt = 0;
      reconnectDelay = 1000;
      setConnectionStatus(true);
      /* Request current state */
      ws.send(JSON.stringify({
        v: 2,
        type: "status_request",
        requestId: generateRequestId(),
        payload: {}
      }));
    };

    ws.onmessage = function (event) {
      var msg;
      try {
        msg = JSON.parse(event.data);
      } catch (e) {
        return;
      }
      handleMessage(msg);
    };

    ws.onclose = function () {
      setConnectionStatus(false);
      scheduleReconnect();
    };

    ws.onerror = function () {
      /* onclose will fire after this */
    };
  }

  function scheduleReconnect() {
    reconnectAttempt++;
    var delay = Math.min(reconnectDelay * Math.pow(2, reconnectAttempt - 1), maxReconnectDelay);
    delay += Math.floor(Math.random() * delay * 0.2);
    setTimeout(connect, delay);
  }

  function setConnectionStatus(connected) {
    if (connected) {
      statusDot.classList.add("connected");
      statusText.textContent = "Connected";
    } else {
      statusDot.classList.remove("connected");
      statusText.textContent = "Disconnected";
    }
  }

  /* ------------------------------------------------------------------ */
  /* Message Handling                                                     */
  /* ------------------------------------------------------------------ */

  function handleMessage(msg) {
    var type = msg.type;
    var payload = msg.payload || {};

    switch (type) {
      case "status":
        handleStatus(payload);
        break;

      case "reading":
        handleReading(payload);
        break;

      case "session_start":
        handleSessionStart(payload);
        break;

      case "session_start_ack":
        handleSessionStartAck(payload);
        break;

      case "session_end":
        handleSessionEnd(payload);
        break;

      case "session_end_ack":
        handleSessionEnd(payload);
        break;

      case "device_state_change":
        handleDeviceStateChange(payload);
        break;

      case "target_approaching":
        handleTargetAlert(payload, "approaching");
        break;

      case "target_reached":
        handleTargetAlert(payload, "reached");
        break;

      case "target_exceeded":
        handleTargetAlert(payload, "exceeded");
        break;

      case "error":
        console.warn("[iGrill] Server error:", payload.code, payload.message);
        break;
    }
  }

  function handleStatus(payload) {
    var previousSessionId = session.id;
    session.id = payload.currentSessionId || null;
    session.startTs = payload.currentSessionStartTs || null;
    session.targets = payload.activeTargets || [];
    session.devices = payload.sessionDevices || [];
    renderSessionBanner();

    /* If we loaded mid-session, fetch existing readings for charts */
    if (session.id != null && session.id !== previousSessionId && chartData.length === 0) {
      setChartsVisible(true);
      fetchSessionReadings(session.id);
    }
  }

  function handleReading(payload) {
    var sensorId = payload.sensorId;
    if (!sensorId) return;

    devices[sensorId] = {
      sensorId: sensorId,
      sessionId: payload.sessionId,
      data: payload.data || {}
    };

    /* If we receive a reading, the device is presumably polling */
    if (!deviceBleStates[sensorId]) {
      deviceBleStates[sensorId] = "polling";
    }

    /* Update session info from reading if needed */
    if (payload.sessionId != null && session.id !== payload.sessionId) {
      session.id = payload.sessionId;
      session.startTs = payload.sessionStartTs || session.startTs;
    }

    renderDevices();
    renderSessionBanner();

    /* Append to charts if session is active */
    if (session.id != null && payload.data) {
      var probeTemps = extractProbeTemps(payload.data.probes);
      if (Object.keys(probeTemps).length > 0) {
        var ts = payload.data.last_update
          ? new Date(payload.data.last_update).getTime() / 1000
          : Date.now() / 1000;
        if (!isNaN(ts)) {
          appendChartReading(ts, probeTemps);
          setChartsVisible(true);
        }
      }
    }
  }

  function handleSessionStart(payload) {
    session.id = payload.sessionId || null;
    session.startTs = payload.sessionStartTs || null;
    session.targets = payload.targets || session.targets;
    session.devices = payload.devices || session.devices;
    probeAlertStates = {};
    clearChartData();
    setChartsVisible(true);
    renderSessionBanner();
    renderDevices();
  }

  function handleSessionStartAck(payload) {
    if (payload.ok) {
      session.id = payload.sessionId || null;
      session.startTs = payload.sessionStartTs || null;
      session.targets = payload.targets || [];
      session.devices = payload.devices || [];
      probeAlertStates = {};
      clearChartData();
      setChartsVisible(true);
      renderSessionBanner();
      renderDevices();
    }
  }

  function handleSessionEnd() {
    session.id = null;
    session.startTs = null;
    session.targets = [];
    session.devices = [];
    probeAlertStates = {};
    /* Keep charts visible with final data — don't destroy until new session or tab switch */
    renderSessionBanner();
    renderDevices();
  }

  function handleDeviceStateChange(payload) {
    var address = payload.address;
    var state = payload.state;
    if (address && state) {
      deviceBleStates[address] = state;
      renderDevices();
    }
  }

  function handleTargetAlert(payload, level) {
    var key = payload.sensorId + ":" + payload.probeIndex;
    /* Only escalate: approaching -> reached -> exceeded */
    var current = probeAlertStates[key];
    var levels = { "approaching": 1, "reached": 2, "exceeded": 3 };
    if (!current || (levels[level] || 0) >= (levels[current] || 0)) {
      probeAlertStates[key] = level;
    }
    renderDevices();
  }

  /* ------------------------------------------------------------------ */
  /* Init                                                                */
  /* ------------------------------------------------------------------ */

  renderSessionBanner();
  renderDevices();
  connect();

})();
</script>

</body>
</html>
