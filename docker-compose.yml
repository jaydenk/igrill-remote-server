services:
  igrill:
    image: ghcr.io/jaydenk/igrill-remote-server:latest
    container_name: igrill-service
    environment:
      - IGRILL_PORT=${IGRILL_PORT:-39120}
      - IGRILL_POLL_INTERVAL=${IGRILL_POLL_INTERVAL:-15}
      - IGRILL_TIMEOUT=${IGRILL_TIMEOUT:-30}
      - IGRILL_CONNECT_TIMEOUT=${IGRILL_CONNECT_TIMEOUT:-10}
      - IGRILL_MAX_BACKOFF=${IGRILL_MAX_BACKOFF:-60}
      - IGRILL_MAC_PREFIX=${IGRILL_MAC_PREFIX:-70:91:8F}
      - IGRILL_BIND_ADDRESS=${IGRILL_BIND_ADDRESS:-0.0.0.0}
      - IGRILL_SCAN_INTERVAL=${IGRILL_SCAN_INTERVAL:-60}
      - IGRILL_SCAN_TIMEOUT=${IGRILL_SCAN_TIMEOUT:-5}
      - IGRILL_LOG_LEVEL=${IGRILL_LOG_LEVEL:-INFO}
      - IGRILL_LOG_LEVEL_BLE=${IGRILL_LOG_LEVEL_BLE:-}
      - IGRILL_LOG_LEVEL_WS=${IGRILL_LOG_LEVEL_WS:-}
      - IGRILL_LOG_LEVEL_SESSION=${IGRILL_LOG_LEVEL_SESSION:-}
      - IGRILL_LOG_LEVEL_ALERT=${IGRILL_LOG_LEVEL_ALERT:-}
      - IGRILL_LOG_LEVEL_HTTP=${IGRILL_LOG_LEVEL_HTTP:-}
      - IGRILL_RECONNECT_GRACE=${IGRILL_RECONNECT_GRACE:-60}
      - IGRILL_DB_PATH=${IGRILL_DB_PATH:-/data/igrill.db}
      - IGRILL_SESSION_TOKEN=${IGRILL_SESSION_TOKEN:-}
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/run/dbus/system_bus_socket
    ports:
      - "${IGRILL_PORT:-39120}:${IGRILL_PORT:-39120}"
    volumes:
      - /run/dbus:/run/dbus
      - /etc/localtime:/etc/localtime:ro
      - igrill-data:/data
    restart: unless-stopped

volumes:
  igrill-data:
